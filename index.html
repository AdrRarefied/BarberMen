<!doctype html>
<html lang="es">
  <head>
    <!-- Configuración básica -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Título optimizado (SEO) -->
    <title>Barber Men | Barbería en Guadalajara</title>

    <!-- Descripción REAL () -->
    <meta
      name="description"
      content="Barber Men, barbería profesional en Guadalajara. Cortes modernos, fades, barba y estilismo masculino. Agenda tu cita hoy."
    />

    <!-- Autor (opcional, pero ya sin Lovable) -->
    <meta name="author" content="Barber Men" />

    <!-- ==============================
        OPEN GRAPH (para Facebook / WhatsApp)
    ============================== -->
    <meta property="og:title" content="Barber Men | Barbería en Guadalajara" />
    <meta
      property="og:description"
      content="Cortes modernos, fades y barbería profesional en Guadalajara. Reserva tu cita fácil y rápido."
    />
    <meta property="og:type" content="website" />

    <!-- IMPORTANTE: cambia esta imagen por una tuya -->
    <meta property="og:image" content="" />

    <!-- ==============================
        TWITTER ()
    ============================== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Barber Men" />
    <meta
      name="twitter:description"
      content="Barbería profesional en Guadalajara. Agenda tu cita."
    />
    <meta name="twitter:image" content="/og-image.jpg" />

    <!-- Favicon (muy importante cambiarlo) -->
    <link rel="icon" href="/logo.png" />
  </head>

  <body>
    <!-- Aquí se monta React -->
    <div id="root"></div>

    <!-- Script principal -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
